<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">

  <section class="w-full max-w-md p-8 bg-white shadow-lg rounded-lg border border-gray-300">
    <div class="text-center">
      <h2 class="text-2xl font-bold text-gray-800">Forgot Password?</h2>
      <p class="mt-2 text-gray-600">Enter your email, and we’ll send you a reset link.</p>
    </div>

    <form action="#" class="mt-6">
      <!-- Email Field -->
      <div>
        <label for="email" class="block text-sm font-medium text-gray-700">Email Address</label>
        <input 
          type="email" 
          id="email" 
          class="mt-1 w-full rounded-lg border-gray-300 p-3 text-sm shadow-sm focus:ring focus:ring-blue-300" 
          placeholder="Enter your email" 
          required 
        />
      </div>

      <!-- Submit Button -->
      <button 
        type="submit" 
        class="mt-4 w-full bg-blue-500 text-white rounded-lg py-3 text-sm font-medium hover:bg-blue-600"
      >
        Send Reset Link
      </button>
      
      <!-- Back to Login -->
      <p class="mt-4 text-center text-sm text-gray-500">
        Remember your password?
        <a href="login.html" class="text-blue-500 hover:underline">Login here</a>
      </p>
    </form>
  </section>

</body>
</html>
